# Copy to /etc/nginx/sites-available/ on the server, adjust paths, then symlink to sites-enabled
# Assumptions:
#   - Static files at /home/project/task/frontend-dist
#   - backend-ts listens on 127.0.0.1:3000 (match PORT in backend-ts/.env)

server {
    listen 80;
    server_name 43.160.235.100;

    root /home/project/task/frontend-dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
